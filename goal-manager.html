<style>
:root {
  --cream: #FFFBF0;
  --warm-white: #FFFFFF;
  --amber: #F59E0B;
  --amber-light: #FDE68A;
  --amber-pale: #FEF3C7;
  --coral: #F97316;
  --coral-pale: #FFEDD5;
  --green: #10B981;
  --green-pale: #D1FAE5;
  --red: #EF4444;
  --red-pale: #FEE2E2;
  --purple: #8B5CF6;
  --purple-pale: #EDE9FE;
  --blue: #3B82F6;
  --blue-pale: #DBEAFE;
  --text: #1C1917;
  --text-muted: #78716C;
  --text-light: #A8A29E;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--cream);
  color: var(--text);
  font-family: 'M PLUS Rounded 1c', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
input, textarea, select, button { font-family: 'M PLUS Rounded 1c', sans-serif; }
select { -webkit-appearance: auto; }

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.fade-in { animation: fadeIn 0.4s ease both; }

/* Save indicator */
.save-badge {
  position: fixed; top: 12px; right: 12px;
  background: var(--green); color: #fff;
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 999;
  box-shadow: 0 2px 8px rgba(16,185,129,0.3);
}
.save-badge.show { opacity: 1; }

/* Header */
.header {
  background: linear-gradient(135deg, #FEF3C7 0%, #FFEDD5 50%, #FDE8D8 100%);
  padding: 16px 16px 0;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid rgba(245,158,11,0.15);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.header-title {
  font-size: 18px; font-weight: 800; color: var(--text);
  letter-spacing: -0.3px;
}
.header-date {
  font-size: 11px; color: var(--text-muted); font-weight: 500;
  background: rgba(255,255,255,0.6); padding: 3px 8px; border-radius: 20px;
}
.tabs {
  display: flex; gap: 4px;
}
.tab-btn {
  flex: 1; padding: 9px 4px;
  background: none; border: none; border-bottom: 2.5px solid transparent;
  font-size: 12px; font-weight: 700; cursor: pointer;
  color: var(--text-muted); transition: all 0.2s;
}
.tab-btn.active {
  color: var(--amber); border-bottom-color: var(--amber);
}

/* Cards */
.card {
  background: var(--warm-white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.card-amber { border-left: 3px solid var(--amber); }
.card-coral { border-left: 3px solid var(--coral); }
.card-green { border-left: 3px solid var(--green); }
.card-red { border-left: 3px solid var(--red); }
.card-purple { border-left: 3px solid var(--purple); }

.section-label {
  font-size: 10px; font-weight: 800;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 7px;
}
.label-amber { color: var(--amber); }
.label-coral { color: var(--coral); }
.label-green { color: var(--green); }
.label-red { color: var(--red); }
.label-purple { color: var(--purple); }
.label-blue { color: var(--blue); }

/* Inputs */
.input-clean {
  width: 100%; background: var(--cream);
  border: 1.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color 0.2s;
}
.input-clean:focus { border-color: var(--amber); }
.textarea-clean {
  width: 100%; background: var(--cream);
  border: 1.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-size: 13px; outline: none;
  resize: none; transition: border-color 0.2s;
}
.textarea-clean:focus { border-color: var(--amber); }
.select-clean {
  width: 100%; background: var(--cream);
  border: 1.5px solid rgba(0,0,0,0.08);
  border-radius: var(--radius-sm); padding: 9px 12px;
  color: var(--text); font-size: 13px; outline: none;
}

/* Buttons */
.btn-primary {
  background: linear-gradient(135deg, var(--amber), var(--coral));
  color: #fff; border: none; border-radius: var(--radius-sm);
  padding: 9px 16px; font-size: 12px; font-weight: 700;
  cursor: pointer; box-shadow: 0 2px 8px rgba(245,158,11,0.3);
  white-space: nowrap; flex-shrink: 0;
}
.btn-outline {
  background: var(--cream); color: var(--text-muted);
  border: 1.5px solid rgba(0,0,0,0.1); border-radius: var(--radius-sm);
  padding: 7px 12px; font-size: 11px; font-weight: 600; cursor: pointer;
}
.btn-ghost {
  background: none; border: none; cursor: pointer;
  color: var(--text-light); font-size: 16px; padding: 2px 4px;
  flex-shrink: 0; line-height: 1;
}

/* Pills */
.pill {
  border-radius: 20px; padding: 4px 10px; font-size: 10px;
  font-weight: 700; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; border: 1.5px solid transparent;
  background: var(--cream); color: var(--text-muted);
  transition: all 0.15s;
}

/* Checkbox */
.check-box {
  width: 18px; height: 18px; border-radius: 5px;
  border: 2px solid #D6D3D1; background: transparent;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.check-box.checked {
  background: var(--green); border-color: var(--green);
}

/* Goal node */
.node-card {
  background: var(--warm-white);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 10px 12px;
  margin-bottom: 6px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  overflow: hidden;
}

/* Progress bar */
.progress-bar {
  height: 3px; background: #E7E5E4; border-radius: 2px; flex: 1;
}
.progress-fill {
  height: 100%; border-radius: 2px; transition: width 0.3s;
}

/* Meditation timer */
.med-timer {
  background: linear-gradient(135deg, #D1FAE5, #A7F3D0);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  margin-bottom: 10px;
}
.med-time {
  font-size: 36px; font-weight: 800; color: #065F46;
  font-family: 'Zen Maru Gothic', monospace;
  letter-spacing: 2px;
}
.med-btn {
  background: #059669; color: #fff; border: none;
  border-radius: 20px; padding: 8px 20px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  box-shadow: 0 2px 8px rgba(5,150,105,0.3);
}

/* Today banner */
.today-banner {
  background: linear-gradient(135deg, var(--amber-pale), var(--coral-pale));
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.today-banner .sun { font-size: 22px; }
.today-banner .date-text { font-size: 12px; color: var(--text-muted); font-weight: 600; }

/* History entry */
.history-card {
  background: var(--warm-white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
}
.history-date {
  font-size: 11px; font-weight: 800; color: var(--amber);
  letter-spacing: 0.5px; margin-bottom: 8px;
}

/* Bulk modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 200; display: flex; align-items: flex-end;
  backdrop-filter: blur(2px);
}
.modal-sheet {
  width: 100%; background: var(--warm-white);
  border-radius: 20px 20px 0 0; padding: 20px;
  max-height: 80vh; overflow-y: auto;
}

/* Filter bar */
.filter-bar {
  padding: 6px 14px; display: flex; gap: 5px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid var(--border);
  background: var(--cream);
}
.filter-bar::-webkit-scrollbar { display: none; }

/* Quick add */
.quick-add {
  padding: 10px 14px; display: flex; gap: 8px;
  align-items: center; border-bottom: 1px solid var(--border);
  background: var(--warm-white);
}
</style>
</head>
<body>
<div class="save-badge" id="saveIndicator">保存 ✓</div>
<div id="app"></div>
<script>
// ── Storage ────────────────────────────────────────────────────────────────────
const lsGet=(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
let saveTimer=null;
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));const el=document.getElementById('saveIndicator');if(el){el.classList.add('show');clearTimeout(saveTimer);saveTimer=setTimeout(()=>el.classList.remove('show'),1500);}}catch{}};

// ── Constants ──────────────────────────────────────────────────────────────────
const HORIZONS=["人生の目標","5年後","1年後","半年後","1ヶ月後","1週間後","今日"];
const STATUSES=["未着手","進行中","完了"];
const AREAS=["仕事","家族・恋人","プライベート","健康"];
const AREA_COLOR={"仕事":"#3B82F6","家族・恋人":"#EC4899","プライベート":"#8B5CF6","健康":"#10B981"};
const HOR_COLOR={"人生の目標":"#8B5CF6","5年後":"#3B82F6","1年後":"#10B981","半年後":"#F59E0B","1ヶ月後":"#F97316","1週間後":"#EF4444","今日":"#EC4899"};
const STA_COLOR={"未着手":{bg:"#F5F5F4",t:"#78716C"},"進行中":{bg:"#DBEAFE",t:"#1D4ED8"},"完了":{bg:"#D1FAE5",t:"#065F46"}};

const uid=()=>Math.random().toString(36).slice(2,9);
const todayStr=()=>new Date().toISOString().slice(0,10);
const yesterdayStr=()=>{const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);};
const monthStr=()=>new Date().toISOString().slice(0,7);
const weekStr=()=>{const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return d.toISOString().slice(0,10);};
const fmtDate=d=>d.replace(/-/g,"/");
const weekdays=["日","月","火","水","木","金","土"];
const todayLabel=()=>{const d=new Date();return`${d.getMonth()+1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;};

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ── State ──────────────────────────────────────────────────────────────────────
const defGoals={nodes:{r1:{id:"r1",title:"理想の後輩になる",timeHorizon:"1年後",status:"進行中",progress:10,priority:"高",lifeArea:"仕事",parentId:null,children:[]}},rootIds:["r1"]};
const defEntry=()=>({goal:"",tasks:[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}],challenge:"",challengeResponse:""});

let goals=lsGet("goals",defGoals);
let routineEntries=lsGet("routine-entries",{});
let monthlyGoal=lsGet("monthly-"+monthStr(),"");
let weeklyGoal=lsGet("weekly-"+weekStr(),"");

let S={tab:"routine",rv:"today",search:"",bulkOpen:false,bulkEditOpen:false,af:"全て",hf:"全て",sf:"全て",medMins:5,medSecs:null,medRunning:false,medDone:false,medInterval:null,expanded:{},selected:{}};

function calcProgress(id){
  const n=goals.nodes[id];if(!n)return 0;
  const ch=n.children||[];
  if(!ch.length)return n.progress;
  const sum=ch.reduce((acc,cid)=>acc+calcProgress(cid),0);
  return Math.round(sum/ch.length);
}
function isExpanded(id){return S.expanded[id]!==false;}// default true

function getEntry(){if(!routineEntries[todayStr()])routineEntries[todayStr()]=defEntry();return routineEntries[todayStr()];}
function saveEntries(){lsSet("routine-entries",routineEntries);}
function saveGoals(){lsSet("goals",goals);}

function nodeMatches(id){
  const n=goals.nodes[id];if(!n)return false;
  const ok=(S.af==="全て"||n.lifeArea===S.af)&&(S.hf==="全て"||n.timeHorizon===S.hf)&&(S.sf==="全て"||n.status===S.sf);
  if(ok)return true;
  return(n.children||[]).some(c=>nodeMatches(c));
}
function leaves(){return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&(!n.children||!n.children.length));}
function parentsOfLeaves(){const lids=new Set(Object.values(goals.nodes).filter(n=>!n.children||!n.children.length).map(n=>n.id));return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&n.children&&n.children.some(c=>lids.has(c)));}
function grandparents(){const pids=new Set(parentsOfLeaves().map(n=>n.id));return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&n.children&&n.children.some(c=>pids.has(c)));}

function parseIndented(text,area,hor){
  const lines=text.split("\n").filter(l=>l.trim());
  const getI=s=>{let i=0;for(const c of s){if(c===" ")i++;else if(c==="\t")i+=2;else break;}return i;};
  const ns={},rs=[],stack=[];
  lines.forEach(line=>{const ind=getI(line);const title=line.replace(/^[\s\-\*•]+/,"").trim();if(!title)return;const id=uid();ns[id]={id,title,timeHorizon:hor,status:"未着手",progress:0,priority:"中",lifeArea:area,parentId:null,children:[]};while(stack.length&&stack[stack.length-1].ind>=ind)stack.pop();if(stack.length){const pid=stack[stack.length-1].id;ns[id].parentId=pid;ns[pid].children.push(id);}else rs.push(id);stack.push({id,ind});});
  return{ns,rs};
}

// ── Goal Node HTML ─────────────────────────────────────────────────────────────
function nodeHTML(id,depth){
  const n=goals.nodes[id];if(!n||!nodeMatches(id))return"";
  const hc=HOR_COLOR[n.timeHorizon]||"#F59E0B";
  const sc=STA_COLOR[n.status]||STA_COLOR["未着手"];
  const ac=AREA_COLOR[n.lifeArea||"仕事"]||"#3B82F6";
  const hasChildren=(n.children&&n.children.length>0);
  const exp=isExpanded(id);
  const prog=hasChildren?calcProgress(id):n.progress;
  const sel=!!S.selected[id];
  const ch=exp?(n.children||[]).map(c=>nodeHTML(c,depth+1)).join(""):"";

  // Promote: move to parent's level. Demote: make child of previous sibling
  const siblings=n.parentId?(goals.nodes[n.parentId]?.children||[]):(goals.rootIds||[]);
  const idx=siblings.indexOf(id);
  const canPromote=!!n.parentId;
  const canDemote=idx>0;

  return`<div style="margin-left:${depth*16}px">
<div class="node-card" style="border-left:3px solid ${hc};background:${sel?'rgba(245,158,11,.07)':'var(--warm-white)'};border:1px solid ${sel?'rgba(245,158,11,.4)':'var(--border)'}">
  <div style="display:flex;align-items:center;gap:6px;overflow:hidden">
    <!-- Selection checkbox -->
    <div onclick="toggleSel('${id}')" style="width:14px;height:14px;border-radius:3px;border:1.5px solid ${sel?'var(--amber)':'#D6D3D1'};background:${sel?'var(--amber)':'transparent'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s">${sel?'<span style="color:#fff;font-size:8px;font-weight:800">✓</span>':""}</div>
    <!-- Expand/collapse -->
    ${hasChildren?`<span onclick="toggleExp('${id}')" style="color:${exp?'var(--amber)':'#C7B8A8'};font-size:9px;flex-shrink:0;cursor:pointer;transition:transform .2s;transform:rotate(${exp?90:0}deg);display:inline-block">▶</span>`:`<div style="width:10px;flex-shrink:0"></div>`}
    <!-- Status check -->
    <div onclick="cycleStatus('${id}')" style="width:16px;height:16px;border-radius:5px;border:2px solid ${n.status==='完了'?'#10B981':'#D6D3D1'};background:${n.status==='完了'?'#10B981':'transparent'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s">${n.status==='完了'?'<span style="color:#fff;font-size:9px;font-weight:800">✓</span>':""}</div>
    <!-- Title -->
    <span onclick="editTitle('${id}')" style="flex:1;min-width:0;font-size:13px;font-weight:600;color:${n.status==='完了'?'#A8A29E':'#1C1917'};text-decoration:${n.status==='完了'?'line-through':'none'};cursor:text;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.title)}</span>
    <span style="font-size:9px;padding:2px 6px;border-radius:10px;background:${n.priority==='高'?'#FEE2E2':n.priority==='中'?'#FEF3C7':'#F5F5F4'};color:${n.priority==='高'?'#DC2626':n.priority==='中'?'#D97706':'#78716C'};font-weight:700;flex-shrink:0">${n.priority||"中"}</span>
    <button onclick="delNode('${id}')" class="btn-ghost">×</button>
  </div>
  <div style="display:flex;align-items:center;gap:5px;margin-top:7px;margin-left:22px;flex-wrap:wrap">
    <select onchange="updNode('${id}','lifeArea',this.value)" style="background:${ac}18;color:${ac};border:none;border-radius:6px;font-size:10px;padding:3px 5px;font-weight:700">${AREAS.map(a=>`<option${n.lifeArea===a?" selected":""}>${a}</option>`).join("")}</select>
    <select onchange="updNode('${id}','status',this.value)" style="background:${sc.bg};color:${sc.t};border:none;border-radius:6px;font-size:10px;padding:3px 5px;font-weight:700">${STATUSES.map(s=>`<option${n.status===s?" selected":""}>${s}</option>`).join("")}</select>
    <select onchange="updNode('${id}','timeHorizon',this.value)" style="background:${hc}18;color:${hc};border:none;border-radius:6px;font-size:10px;padding:3px 5px;font-weight:700">${HORIZONS.map(h=>`<option${n.timeHorizon===h?" selected":""}>${h}</option>`).join("")}</select>
    <button onclick="addChild('${id}')" style="background:${hc}18;border:none;color:${hc};border-radius:6px;font-size:10px;padding:3px 10px;cursor:pointer;font-weight:700">＋子</button>
    ${canPromote?`<button onclick="promoteNode('${id}')" title="親と同じ階層に上げる" style="background:#EDE9FE;border:none;color:#7C3AED;border-radius:6px;font-size:10px;padding:3px 8px;cursor:pointer;font-weight:700">↑昇格</button>`:""}
    ${canDemote?`<button onclick="demoteNode('${id}')" title="一つ上の兄弟の子にする" style="background:#DBEAFE;border:none;color:#1D4ED8;border-radius:6px;font-size:10px;padding:3px 8px;cursor:pointer;font-weight:700">↓降格</button>`:""}
  </div>
  <div style="display:flex;align-items:center;gap:6px;margin-top:5px;margin-left:22px">
    <div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:${n.status==='完了'?'#10B981':hc}"></div></div>
    ${hasChildren
      ?`<span style="font-size:9px;color:#A8A29E;font-weight:600">${prog}%（自動）</span>`
      :`<input type="number" min="0" max="100" value="${n.progress}" onchange="updNode('${id}','progress',Math.min(100,Math.max(0,Number(this.value))))" style="width:36px;background:transparent;border:none;border-bottom:1px solid #E7E5E4;color:#A8A29E;font-size:9px;font-weight:600;text-align:right;padding:0;outline:none;font-family:inherit"/><span style="font-size:9px;color:#A8A29E;font-weight:600">%</span>`
    }
  </div>
</div>
${ch}</div>`;
}

// ── Goal Tab ───────────────────────────────────────────────────────────────────
function buildGoalTab(){
  const all=Object.values(goals.nodes);
  const done=all.filter(n=>n.status==="完了").length;
  const roots=goals.rootIds.filter(id=>nodeMatches(id));
  const pill=(val,cur,type,color)=>`<button onclick="setF('${type}','${val}')" class="pill" style="${cur===val?`background:${color||'#1C1917'}18;color:${color||'#1C1917'};border-color:${color||'#1C1917'}44`:""}">${val}</button>`;
  return`<div>
<div class="quick-add">
  <input id="qinp" class="input-clean" placeholder="目標を入力してEnter" onkeydown="if(event.key==='Enter')quickAdd()" style="margin:0"/>
  <select id="qarea" style="background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:8px;color:var(--text);font-size:10px;padding:5px 4px;font-weight:700">${AREAS.map(a=>`<option>${a}</option>`).join("")}</select>
  <button onclick="quickAdd()" class="btn-primary" style="padding:8px 12px">追加</button>
  <button onclick="S.bulkOpen=true;render()" class="btn-outline">一括</button>
</div>
<div class="filter-bar">${pill("全て",S.sf,"s","")}${STATUSES.map(s=>pill(s,S.sf,"s",s==="完了"?"#10B981":s==="進行中"?"#3B82F6":"#78716C")).join("")}</div>
<div class="filter-bar">${pill("全て",S.af,"a","")}${AREAS.map(a=>pill(a,S.af,"a",AREA_COLOR[a])).join("")}</div>
<div class="filter-bar">${pill("全て",S.hf,"h","")}${HORIZONS.map(h=>pill(h,S.hf,"h",HOR_COLOR[h])).join("")}</div>
<div style="padding:12px 14px">
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <span style="font-size:10px;color:var(--text-light);font-weight:600;background:var(--warm-white);padding:3px 8px;border-radius:10px;border:1px solid var(--border)">完了 ${done}/${all.length}</span>
  </div>
  ${roots.map(id=>nodeHTML(id,0)).join("")}
  ${roots.length===0?'<div style="text-align:center;padding:40px;color:var(--text-light);font-size:13px">条件に合う目標がありません</div>':""}
</div>
${Object.keys(S.selected).length>0?`
<div style="position:fixed;bottom:0;left:0;right:0;background:var(--warm-white);border-top:2px solid var(--amber);padding:12px 14px;z-index:150;box-shadow:0 -4px 16px rgba(0,0,0,.1)">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span style="font-size:12px;font-weight:800;color:var(--amber)">${Object.keys(S.selected).length}件選択中</span>
    <button onclick="S.selected={};render()" class="btn-outline" style="padding:3px 8px;font-size:10px">解除</button>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    ${STATUSES.map(s=>{const sc=STA_COLOR[s];return`<button onclick="bulkSet('status','${s}')" style="background:${sc.bg};color:${sc.t};border:none;border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;font-weight:700">${s}</button>`;}).join("")}
    ${AREAS.map(a=>`<button onclick="bulkSet('lifeArea','${a}')" style="background:${AREA_COLOR[a]}18;color:${AREA_COLOR[a]};border:none;border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;font-weight:700">${a}</button>`).join("")}
    <select onchange="bulkSet('timeHorizon',this.value)" style="background:var(--cream);border:1px solid var(--border);border-radius:6px;font-size:11px;padding:5px 6px;color:var(--text)"><option value="">時間軸を変更...</option>${HORIZONS.map(h=>`<option value="${h}">${h}</option>`).join("")}</select>
    <select onchange="bulkSet('priority',this.value)" style="background:var(--cream);border:1px solid var(--border);border-radius:6px;font-size:11px;padding:5px 6px;color:var(--text)"><option value="">優先度を変更...</option>${["高","中","低"].map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
  </div>
</div>`:""}
${S.bulkOpen?`<div class="modal-overlay"><div class="modal-sheet">
<div style="font-size:15px;font-weight:800;margin-bottom:4px;color:var(--text)">📋 一括登録</div>
<div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">インデントでサブタスクになります</div>
<textarea id="bulktext" rows="7" class="textarea-clean" placeholder="目標A&#10;  サブ目標1&#10;  サブ目標2&#10;目標B"></textarea>
<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center">
  <select id="bulkarea" style="background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:8px;color:var(--text);font-size:11px;padding:5px 6px">${AREAS.map(a=>`<option>${a}</option>`).join("")}</select>
  <select id="bulkhor" style="background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:8px;color:var(--text);font-size:11px;padding:5px 6px">${HORIZONS.map(h=>`<option>${h}</option>`).join("")}</select>
  <div style="flex:1"></div>
  <button onclick="S.bulkOpen=false;render()" class="btn-outline">キャンセル</button>
  <button onclick="doBulk()" class="btn-primary">登録</button>
</div></div></div>`:""}
</div>`;
}

// ── Routine Tab ────────────────────────────────────────────────────────────────
function buildRoutineTab(){
  const e=getEntry();
  const tasks=e.tasks||[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}];
  const yest=routineEntries[yesterdayStr()];
  const total=Object.keys(routineEntries).length;
  const isToday=S.rv==="today";
  const {medMins:mm,medSecs:ms,medRunning:mr,medDone:md}=S;
  const monthOpts=grandparents().length?grandparents():parentsOfLeaves();
  const weekOpts=parentsOfLeaves();
  const leafOpts=leaves();
  const fmtMed=s=>s===null||s===undefined?mm+":00":Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0");

  let content="";
  if(isToday){content=`<div style="padding:14px" class="fade-in">
<div class="today-banner">
  <span class="sun">🌅</span>
  <div><div style="font-size:14px;font-weight:800">${todayLabel()}</div><div class="date-text">${total}日目のルーティン</div></div>
</div>

<div class="card card-purple">
  <div class="section-label label-purple">📅 今月の目標（${monthStr()}）</div>
  <select onchange="setMonthly(this.value)" class="select-clean" style="color:${monthlyGoal?'var(--text)':'var(--text-light)'}">
    <option value="">月頭に選択...</option>
    ${monthOpts.map(n=>`<option value="${esc(n.title)}"${monthlyGoal===n.title?' selected="selected"':""}>${esc(n.title)}</option>`).join("")}
  </select>
  ${monthlyGoal?`<div style="margin-top:6px;font-size:12px;color:var(--purple);font-weight:700;padding:4px 0">✦ ${esc(monthlyGoal)}</div>`:""}
</div>

<div class="card card-coral">
  <div class="section-label label-coral">📆 今週の目標（${weekStr()}〜）</div>
  <select onchange="setWeekly(this.value)" class="select-clean" style="color:${weeklyGoal?'var(--text)':'var(--text-light)'}">
    <option value="">週頭に選択...</option>
    ${weekOpts.map(n=>`<option value="${esc(n.title)}"${weeklyGoal===n.title?' selected="selected"':""}>${esc(n.title)}</option>`).join("")}
  </select>
  ${weeklyGoal?`<div style="margin-top:6px;font-size:12px;color:var(--coral);font-weight:700;padding:4px 0">✦ ${esc(weeklyGoal)}</div>`:""}
</div>

${yest&&yest.challenge?`<div class="card" style="border-left:3px solid var(--amber);background:var(--amber-pale)">
  <div class="section-label label-amber">⚠️ 昨日の課題（自動表示）</div>
  <div style="font-size:13px;color:var(--text);line-height:1.6;font-weight:500">${esc(yest.challenge)}</div>
</div>`:""}

<div class="card card-amber">
  <div class="section-label label-amber">🎯 今日の目標</div>
  <select onchange="doUpdateEntry('goal',this.value)" class="select-clean" style="color:${e.goal?'var(--text)':'var(--text-light)'}">
    <option value="">今日の目標を選択...</option>
    ${leafOpts.map(n=>`<option value="${esc(n.title)}"${e.goal===n.title?' selected="selected"':""}>${esc(n.title)}</option>`).join("")}
  </select>
  ${e.goal?`<div style="margin-top:6px;font-size:13px;color:var(--amber);font-weight:800;padding:4px 0">▶ ${esc(e.goal)}</div>`:""}
</div>

<div class="card card-amber" style="border-left-color:#8B5CF6">
  <div class="section-label" style="color:#8B5CF6">📋 今日のタスク</div>
  ${tasks.map((t,i)=>`<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
    <div onclick="doToggleTask(${i})" class="check-box ${t.done?'checked':''}">${t.done?'<span style="color:#fff;font-size:10px;font-weight:800">✓</span>':""}</div>
    <input value="${esc(t.t||"")}" placeholder="タスク ${i+1}" onchange="doUpdateTask(${i},'t',this.value)" class="input-clean" style="margin:0;text-decoration:${t.done?'line-through':'none'};color:${t.done?'var(--text-light)':'var(--text)'}"/>
    ${t.done&&t.ts?`<span style="font-size:9px;color:var(--green);font-weight:700;flex-shrink:0;white-space:nowrap">${t.ts}</span>`:""}
  </div>`).join("")}
</div>

${yest&&yest.challenge?`<div class="card card-green">
  <div class="section-label label-green">🔄 昨日の課題 → 今日どうするか</div>
  <textarea placeholder="今日取る行動を書く" rows="2" onchange="doUpdateEntry('challengeResponse',this.value)" class="textarea-clean">${esc(e.challengeResponse||"")}</textarea>
</div>`:""}

<div class="med-timer">
  <div style="font-size:10px;font-weight:800;letter-spacing:1px;color:#065F46;margin-bottom:8px">🧘 瞑想タイマー</div>
  ${!mr&&(ms===null||ms===undefined)?`<div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px">${[3,5,10].map(m=>`<button onclick="S.medMins=${m};render()" style="background:${mm===m?'#059669':'rgba(255,255,255,.6)'};border:none;color:${mm===m?'#fff':'#065F46'};border-radius:15px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">${m}分</button>`).join("")}</div>`:""}
  <div class="med-time">${md?"完了 ✨":fmtMed(ms)}</div>
  <div style="margin-top:10px">
    ${md?`<button class="med-btn" onclick="S.medDone=false;S.medSecs=null;render()">もう一度</button>`
    :mr?`<button class="med-btn" style="background:#DC2626;box-shadow:0 2px 8px rgba(220,38,38,.3)" onclick="clearInterval(S.medInterval);S.medRunning=false;S.medSecs=null;render()">停止</button>`
    :`<button class="med-btn" onclick="startMed()">開始</button>`}
  </div>
</div>

<div class="card card-red">
  <div class="section-label label-red">⚠️ 今日の課題（夜に記録）</div>
  <textarea placeholder="今日うまくいかなかったこと・改善したいこと" rows="2" onchange="doUpdateEntry('challenge',this.value)" class="textarea-clean">${esc(e.challenge||"")}</textarea>
</div>

<div style="text-align:center;font-size:10px;color:var(--text-light);padding:8px 0;font-weight:600">入力すると自動保存されます（右上 ✓）</div>
</div>`;}
  else{
    const dates=Object.keys(routineEntries).filter(d=>d!==todayStr()).sort((a,b)=>b.localeCompare(a));
    const filtered=S.search?dates.filter(d=>{const en=routineEntries[d];return[en.goal||"",...(en.tasks||[]).map(t=>t.t||""),en.challenge||"",en.challengeResponse||""].join(" ").toLowerCase().includes(S.search.toLowerCase())}):dates;
    content=`<div style="padding:14px" class="fade-in">
<input oninput="S.search=this.value;render()" value="${esc(S.search)}" placeholder="🔍 過去の記録を検索..." class="input-clean" style="margin-bottom:12px"/>
${filtered.length===0?'<div style="text-align:center;padding:40px;color:var(--text-light);font-size:13px">記録がまだありません</div>':filtered.map(d=>{
  const en=routineEntries[d];const ts=en.tasks||[];
  return`<div class="history-card">
<div class="history-date">${fmtDate(d)}</div>
${en.goal?`<div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:4px">🎯 ${esc(en.goal)}</div>`:""}
${ts.filter(t=>t.t||t).map(t=>{const tx=t.t||t||"";const dn=t.done;return tx?`<div style="font-size:12px;color:${dn?"var(--green)":"var(--text)"};padding-left:6px;text-decoration:${dn?"line-through":"none"};font-weight:${dn?"600":"400"}">${dn?"✓ ":"· "}${esc(tx)}${t.ts?` <span style="font-size:10px;color:var(--text-light)">(${t.ts})</span>`:""}</div>`:""}).join("")}
${en.challengeResponse?`<div style="font-size:11px;color:var(--green);margin-top:5px;font-weight:600">🔄 ${esc(en.challengeResponse)}</div>`:""}
${en.challenge?`<div style="font-size:11px;color:var(--red);margin-top:2px;font-weight:600">⚠️ ${esc(en.challenge)}</div>`:""}
</div>`;}).join("")}
</div>`;
  }

  return`<div>
<div style="display:flex;padding:10px 14px;gap:6px;border-bottom:1px solid var(--border);background:var(--warm-white);align-items:center">
  <button onclick="S.rv='today';render()" style="background:${S.rv==='today'?'var(--amber-pale)':'var(--cream)'};border:1.5px solid ${S.rv==='today'?'var(--amber)':'var(--border)'};color:${S.rv==='today'?'var(--amber)':'var(--text-muted)'};border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">今日</button>
  <button onclick="S.rv='history';render()" style="background:${S.rv==='history'?'var(--amber-pale)':'var(--cream)'};border:1.5px solid ${S.rv==='history'?'var(--amber)':'var(--border)'};color:${S.rv==='history'?'var(--amber)':'var(--text-muted)'};border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">振り返り</button>
  <span style="margin-left:auto;font-size:10px;color:var(--text-light);font-weight:600">${total}日目</span>
</div>
${content}</div>`;
}

// ── App ────────────────────────────────────────────────────────────────────────
function buildApp(){
  const isR=S.tab==="routine";
  return`<div style="min-height:100vh;background:var(--cream)">
<div class="header">
  <div class="header-top">
    <div class="header-title">${isR?"🌅 朝ルーティン":"🎯 目標管理"}</div>
    <div class="header-date">${todayLabel()}</div>
  </div>
  <div class="tabs">
    <button onclick="S.tab='routine';render()" class="tab-btn ${isR?'active':''}">🌅 朝ルーティン</button>
    <button onclick="S.tab='goals';render()" class="tab-btn ${!isR?'active':''}">🎯 目標管理</button>
  </div>
</div>
${isR?buildRoutineTab():buildGoalTab()}
</div>`;
}

function render(){document.getElementById("app").innerHTML=buildApp();}

// ── Actions ────────────────────────────────────────────────────────────────────
window.toggleExp=function(id){S.expanded[id]=!isExpanded(id);render();};
window.toggleSel=function(id){if(S.selected[id])delete S.selected[id];else S.selected[id]=true;render();};
window.bulkSet=function(field,val){if(!val)return;Object.keys(S.selected).forEach(id=>{if(goals.nodes[id])goals.nodes[id][field]=val;});saveGoals();render();};
window.promoteNode=function(id){
  const n=goals.nodes[id];if(!n||!n.parentId)return;
  const parent=goals.nodes[n.parentId];if(!parent)return;
  // Remove from parent's children
  parent.children=parent.children.filter(c=>c!==id);
  if(parent.parentId){
    // Add to grandparent's children after parent
    const gp=goals.nodes[parent.parentId];
    const pIdx=gp.children.indexOf(n.parentId);
    gp.children.splice(pIdx+1,0,id);
    n.parentId=parent.parentId;
  } else {
    // Promote to root
    const pIdx=goals.rootIds.indexOf(n.parentId);
    goals.rootIds.splice(pIdx+1,0,id);
    n.parentId=null;
  }
  saveGoals();render();
};
window.demoteNode=function(id){
  const n=goals.nodes[id];
  const siblings=n.parentId?(goals.nodes[n.parentId]?.children||[]):(goals.rootIds);
  const idx=siblings.indexOf(id);
  if(idx===0)return;
  const prevId=siblings[idx-1];
  const prev=goals.nodes[prevId];if(!prev)return;
  // Remove from current level
  siblings.splice(idx,1);
  // Add to prev sibling's children
  n.parentId=prevId;
  prev.children.push(id);
  saveGoals();render();
};
window.setF=function(t,v){if(t==="a")S.af=v;else if(t==="h")S.hf=v;else S.sf=v;render();};
window.setMonthly=function(v){monthlyGoal=v;lsSet("monthly-"+monthStr(),v);render();};
window.setWeekly=function(v){weeklyGoal=v;lsSet("weekly-"+weekStr(),v);render();};
window.doUpdateEntry=function(f,v){const e=getEntry();e[f]=v;routineEntries[todayStr()]=e;saveEntries();render();};
window.doUpdateTask=function(i,f,v){const e=getEntry();if(!e.tasks)e.tasks=[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}];e.tasks[i]={...e.tasks[i],[f]:v};routineEntries[todayStr()]=e;saveEntries();};
window.doToggleTask=function(i){const e=getEntry();if(!e.tasks)e.tasks=[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}];e.tasks[i].done=!e.tasks[i].done;if(e.tasks[i].done)e.tasks[i].ts=new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});routineEntries[todayStr()]=e;saveEntries();render();};
window.startMed=function(){clearInterval(S.medInterval);S.medSecs=S.medMins*60;S.medRunning=true;S.medDone=false;S.medInterval=setInterval(()=>{S.medSecs--;if(S.medSecs<=0){clearInterval(S.medInterval);S.medRunning=false;S.medDone=true;}render();},1000);render();};
window.cycleStatus=function(id){const n=goals.nodes[id];if(!n)return;n.status=n.status==="完了"?"未着手":n.status==="未着手"?"進行中":"完了";if(n.status==="完了")n.progress=100;saveGoals();render();};
window.editTitle=function(id){const n=goals.nodes[id];if(!n)return;const t=prompt("タイトルを編集",n.title);if(t&&t.trim()){n.title=t.trim();saveGoals();render();}};
window.delNode=function(id){if(!confirm("削除しますか？"))return;const n=goals.nodes[id];if(!n)return;const del=new Set();const col=i=>{del.add(i);(goals.nodes[i]?.children||[]).forEach(col);};col(id);del.forEach(i=>delete goals.nodes[i]);if(n.parentId&&goals.nodes[n.parentId])goals.nodes[n.parentId].children=goals.nodes[n.parentId].children.filter(c=>c!==id);goals.rootIds=goals.rootIds.filter(r=>r!==id);saveGoals();render();};
window.updNode=function(id,f,v){goals.nodes[id][f]=v;saveGoals();render();};
window.addChild=function(pid){const nid=uid();const p=goals.nodes[pid];goals.nodes[nid]={id:nid,title:"新しい目標",timeHorizon:p.timeHorizon,status:"未着手",progress:0,priority:"中",lifeArea:p.lifeArea||"仕事",parentId:pid,children:[]};goals.nodes[pid].children.push(nid);saveGoals();render();};
window.quickAdd=function(){const inp=document.getElementById("qinp");if(!inp||!inp.value.trim())return;const nid=uid();const area=document.getElementById("qarea")?.value||"仕事";goals.nodes[nid]={id:nid,title:inp.value.trim(),timeHorizon:"1年後",status:"未着手",progress:0,priority:"高",lifeArea:area,parentId:null,children:[]};goals.rootIds.push(nid);saveGoals();inp.value="";render();};
window.doBulk=function(){const text=document.getElementById("bulktext")?.value||"";const area=document.getElementById("bulkarea")?.value||"仕事";const hor=document.getElementById("bulkhor")?.value||"1年後";if(!text.trim())return;const{ns,rs}=parseIndented(text,area,hor);Object.assign(goals.nodes,ns);goals.rootIds.push(...rs);saveGoals();S.bulkOpen=false;render();};

render();
</script>
</body>
