<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>朝ルーティン</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FFFBF0;--warm:#FFFFFF;--amber:#F59E0B;--amber-pale:#FEF3C7;--coral:#F97316;--coral-pale:#FFEDD5;
  --green:#10B981;--green-pale:#D1FAE5;--red:#EF4444;--red-pale:#FEE2E2;--purple:#8B5CF6;--purple-pale:#EDE9FE;
  --blue:#3B82F6;--blue-pale:#DBEAFE;--text:#1C1917;--muted:#78716C;--light:#A8A29E;
  --border:rgba(0,0,0,.07);--shadow:0 2px 12px rgba(0,0,0,.06);--r:14px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--text);font-family:'M PLUS Rounded 1c',sans-serif;min-height:100vh;overflow-x:hidden}
input,textarea,select,button{font-family:'M PLUS Rounded 1c',sans-serif}
select{-webkit-appearance:auto}
.save-badge{position:fixed;top:10px;right:12px;background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;box-shadow:0 2px 8px rgba(16,185,129,.3)}
.save-badge.show{opacity:1}
.header{background:linear-gradient(135deg,var(--amber-pale),var(--coral-pale));padding:14px 14px 0;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(245,158,11,.15)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-title{font-size:17px;font-weight:800;color:var(--text)}
.header-date{font-size:11px;color:var(--muted);font-weight:500;background:rgba(255,255,255,.6);padding:3px 8px;border-radius:20px}
.tabs{display:flex;gap:4px}
.tab-btn{flex:1;padding:8px 4px;background:none;border:none;border-bottom:2.5px solid transparent;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s}
.tab-btn.active{color:var(--amber);border-bottom-color:var(--amber)}
.card{background:var(--warm);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px;border:1px solid var(--border)}
.card-amber{border-left:3px solid var(--amber)}.card-coral{border-left:3px solid var(--coral)}
.card-green{border-left:3px solid var(--green)}.card-red{border-left:3px solid var(--red)}
.card-purple{border-left:3px solid var(--purple)}.card-blue{border-left:3px solid var(--blue)}
.lbl{font-size:9px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.lbl-amber{color:var(--amber)}.lbl-coral{color:var(--coral)}.lbl-green{color:var(--green)}
.lbl-red{color:var(--red)}.lbl-purple{color:var(--purple)}.lbl-blue{color:var(--blue)}
.input{width:100%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--rs);padding:8px 10px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.input:focus{border-color:var(--amber)}
.textarea{width:100%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--rs);padding:8px 10px;color:var(--text);font-size:13px;outline:none;resize:none}
.select{width:100%;background:var(--cream);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--rs);padding:8px 10px;color:var(--text);font-size:13px;outline:none}
.btn{background:linear-gradient(135deg,var(--amber),var(--coral));color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-sm{background:var(--cream);color:var(--muted);border:1.5px solid rgba(0,0,0,.1);border-radius:var(--rs);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
.pill{border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid transparent;background:var(--cream);color:var(--muted);transition:all .15s}
.check{width:16px;height:16px;border-radius:4px;border:2px solid #D6D3D1;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.check.done{background:var(--green);border-color:var(--green)}
.pbar{height:3px;background:#E7E5E4;border-radius:2px;flex:1}
.pbar-fill{height:100%;border-radius:2px;transition:width .3s}
.node-card{background:var(--warm);border-radius:var(--rs);border:1px solid var(--border);padding:9px 11px;margin-bottom:5px;overflow:hidden}
.filter-bar{padding:5px 12px;display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);background:var(--cream)}
.filter-bar::-webkit-scrollbar{display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-sheet{width:100%;background:var(--warm);border-radius:20px 20px 0 0;padding:18px;max-height:80vh;overflow-y:auto}
.seat-tag{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0}
.seat-deep{background:#EDE9FE;color:#6D28D9}
.seat-light{background:#D1FAE5;color:#065F46}
</style>
</head>
<body>
<div class="save-badge" id="si">保存 ✓</div>
<div id="app"></div>
<script>
// ── Storage ──────────────────────────────────────────────────────────────────
let _st=null;
const lsGet=(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));const el=document.getElementById('si');if(el){el.classList.add('show');clearTimeout(_st);_st=setTimeout(()=>el.classList.remove('show'),1500);}}catch{}};

// ── Constants ─────────────────────────────────────────────────────────────────
const HORIZONS=["人生の目標","5年後","1年後","半年後","1ヶ月後","1週間後","今日"];
const STATUSES=["未着手","進行中","完了"];
const AREAS=["仕事","家族・恋人","プライベート","健康"];
const AC={"仕事":"#3B82F6","家族・恋人":"#EC4899","プライベート":"#8B5CF6","健康":"#10B981"};
const HC={"人生の目標":"#8B5CF6","5年後":"#3B82F6","1年後":"#10B981","半年後":"#F59E0B","1ヶ月後":"#F97316","1週間後":"#EF4444","今日":"#EC4899"};
const SC={"未着手":{bg:"#F5F5F4",t:"#78716C"},"進行中":{bg:"#DBEAFE",t:"#1D4ED8"},"完了":{bg:"#D1FAE5",t:"#065F46"}};
const DAY_SLOTS={
  "テレワーク":[{label:"🌅 朝の集中時間",time:"8:00〜8:45",mins:45},{label:"🌙 夜の自分時間",time:"21:30〜22:15",mins:45}],
  "出勤":[{label:"🌅 出発前",time:"7:35〜8:05",mins:30},{label:"🚃 帰りの通勤",time:"18:15〜18:45",mins:30},{label:"🌙 夜の自分時間",time:"22:30〜23:00",mins:30}],
  "休日":[{label:"🏋️ 自分時間",time:"4時間（はるかさんと交渉）",mins:240}]
};

const uid=()=>Math.random().toString(36).slice(2,9);
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr=()=>fmtDate(new Date());
const yestStr=()=>{const d=new Date();d.setDate(d.getDate()-1);return fmtDate(d);};
const tomoStr=()=>{const d=new Date();d.setDate(d.getDate()+1);return fmtDate(d);};
const monthStr=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const weekStr=()=>{const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return fmtDate(d);};
const WD=["日","月","火","水","木","金","土"];
const todayLabel=()=>{const d=new Date();return`${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`;};
const fmtDisp=d=>String(d||"").replace(/-/g,"/");
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── State ─────────────────────────────────────────────────────────────────────
const defGoals={nodes:{r1:{id:"r1",title:"理想の後輩になる",timeHorizon:"1年後",status:"進行中",progress:10,priority:"高",lifeArea:"仕事",parentId:null,children:[]}},rootIds:["r1"]};
const defEntry=()=>({goal:"",tasks:[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}],challenge:"",challengeResponse:""});

let goals=lsGet("goals",defGoals);
let routineEntries=lsGet("routine-entries",{});
let tasks=lsGet("task-list",[]);
let monthlyGoal=lsGet("monthly-"+monthStr(),"");
let weeklyGoal=lsGet("weekly-"+weekStr(),"");
let firstSteps=lsGet("first-steps",{});

const saveGoals=()=>lsSet("goals",goals);
const saveEntries=()=>lsSet("routine-entries",routineEntries);
const saveTasks=()=>lsSet("task-list",tasks);
const saveFirstSteps=()=>lsSet("first-steps",firstSteps);

function getEntry(){if(!routineEntries[todayStr()])routineEntries[todayStr()]=defEntry();return routineEntries[todayStr()];}
function getDayType(){return lsGet("daytype-"+todayStr(),"テレワーク");}
function setDayType(v){lsSet("daytype-"+todayStr(),v);}
function getSlotTask(i){return lsGet("slot-"+todayStr()+"-"+i,"");}
function getSlotSeat(i){return lsGet("slotseat-"+todayStr()+"-"+i,"all");}
function setSlotSeat(i,v){lsSet("slotseat-"+todayStr()+"-"+i,v);}
function setSlotTask(i,v){lsSet("slot-"+todayStr()+"-"+i,v);}

// ── First step (最初の一歩) ─────────────────────────────────────────────────────
function getFirstStep(date){return firstSteps[date]||null;}
function setFirstStepText(date,text,goalNodeId){
  const prev=firstSteps[date]||{done:false,doneTs:""};
  firstSteps[date]={...prev,text,goalNodeId:goalNodeId||null};
  saveFirstSteps();
}
function toggleFirstStepDone(date){
  const fs=firstSteps[date];if(!fs)return;
  fs.done=!fs.done;
  fs.doneTs=fs.done?new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"";
  saveFirstSteps();
}

// ── S (UI state) ──────────────────────────────────────────────────────────────
let S={
  tab:"routine",rv:"today",search:"",bulkOpen:false,editMode:false,taskView:"matrix",
  af:"全て",hf:"全て",sf:"全て",expanded:{},selected:{}
};

// ── Goal helpers ──────────────────────────────────────────────────────────────
function nodeMatches(id){
  const n=goals.nodes[id];if(!n)return false;
  const ok=(S.af==="全て"||n.lifeArea===S.af)&&(S.hf==="全て"||n.timeHorizon===S.hf)&&(S.sf==="全て"||n.status===S.sf);
  return ok||(n.children||[]).some(c=>nodeMatches(c));
}
function calcProgress(id){
  const n=goals.nodes[id];if(!n)return 0;
  const ch=n.children||[];
  if(!ch.length)return n.progress;
  return Math.round(ch.reduce((a,c)=>a+calcProgress(c),0)/ch.length);
}
function isExp(id){return S.expanded[id]!==false;}
function leaves(){return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&(!n.children||!n.children.length));}
function parentsOfLeaves(){
  const lids=new Set(Object.values(goals.nodes).filter(n=>!n.children||!n.children.length).map(n=>n.id));
  return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&n.children?.some(c=>lids.has(c)));
}
function grandparents(){
  const pids=new Set(parentsOfLeaves().map(n=>n.id));
  return Object.values(goals.nodes).filter(n=>n.status!=="完了"&&n.children?.some(c=>pids.has(c)));
}

// ── Task helpers ──────────────────────────────────────────────────────────────
function syncLeafTasks(){
  const leafIds=new Set(Object.values(goals.nodes).filter(n=>!n.children||!n.children.length).map(n=>n.id));
  tasks=tasks.filter(t=>!t.goalNodeId||leafIds.has(t.goalNodeId));
  const existing=new Set(tasks.filter(t=>t.goalNodeId).map(t=>t.goalNodeId));
  leafIds.forEach(id=>{
    if(!existing.has(id)){
      const n=goals.nodes[id];if(!n)return;
      tasks.push({id:uid(),title:n.title,importance:"中",seatType:"deep",deadline:null,status:"未着手",goalNodeId:id,recurring:false});
    }
  });
  saveTasks();
}
function daysUntil(s){if(!s)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(s)-t)/86400000);}
function urgLevel(s){const d=daysUntil(s);if(d===null)return"none";if(d<=3)return"high";if(d<=7)return"med";return"low";}
function isImp(t){return t.importance==="高"||t.importance==="中";}
function isUrg(t){const u=urgLevel(t.deadline);return u==="high"||u==="med";}
function parseIndented(text,area,hor){
  const lines=text.split("\n").filter(l=>l.trim());
  const getI=s=>{let i=0;for(const c of s){if(c===" ")i++;else if(c==="\t")i+=2;else break;}return i;};
  const ns={},rs=[],stack=[];
  lines.forEach(line=>{
    const ind=getI(line);const title=line.replace(/^[\s\-\*•]+/,"").trim();if(!title)return;
    const id=uid();
    ns[id]={id,title,timeHorizon:hor,status:"未着手",progress:0,priority:"中",lifeArea:area,parentId:null,children:[]};
    while(stack.length&&stack[stack.length-1].ind>=ind)stack.pop();
    if(stack.length){const pid=stack[stack.length-1].id;ns[id].parentId=pid;ns[pid].children.push(id);}
    else rs.push(id);
    stack.push({id,ind});
  });
  return{ns,rs};
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){document.getElementById("app").innerHTML=buildApp();}

// ── Goal Node HTML ─────────────────────────────────────────────────────────────
function nodeHTML(id,depth){
  const n=goals.nodes[id];if(!n||!nodeMatches(id))return"";
  const hc=HC[n.timeHorizon]||"#F59E0B",sc=SC[n.status]||SC["未着手"],ac=AC[n.lifeArea||"仕事"]||"#3B82F6";
  const hasKids=!!(n.children&&n.children.length);
  const prog=hasKids?calcProgress(id):n.progress;
  const sel=!!S.selected[id];
  const exp=isExp(id);
  const ch=exp?(n.children||[]).map(c=>nodeHTML(c,depth+1)).join(""):"";
  const sib=n.parentId?(goals.nodes[n.parentId]?.children||[]):(goals.rootIds||[]);
  const idx=sib.indexOf(id);
  return`<div style="margin-left:${depth*15}px">
<div class="node-card" style="border-left:3px solid ${hc};background:${sel?"rgba(245,158,11,.06)":"var(--warm)"};border:1px solid ${sel?"rgba(245,158,11,.4)":"var(--border)"}">
  <div style="display:flex;align-items:center;gap:5px;overflow:hidden">
    ${S.editMode?`<div onclick="toggleSel('${id}')" style="width:13px;height:13px;border-radius:3px;border:1.5px solid ${sel?"var(--amber)":"#D6D3D1"};background:${sel?"var(--amber)":"transparent"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">${sel?'<span style="color:#fff;font-size:7px">✓</span>':""}</div>`:""}
    ${hasKids?`<span onclick="S.expanded['${id}']=!isExp('${id}');render()" style="color:${exp?"var(--amber)":"#C7B8A8"};font-size:9px;flex-shrink:0;cursor:pointer;display:inline-block;transition:transform .2s;transform:rotate(${exp?90:0}deg)">▶</span>`:`<div style="width:10px;flex-shrink:0"></div>`}
    ${!hasKids?`<div onclick="cycleStatus('${id}')" style="width:15px;height:15px;border-radius:4px;border:2px solid ${n.status==="完了"?"#10B981":"#D6D3D1"};background:${n.status==="完了"?"#10B981":"transparent"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">${n.status==="完了"?'<span style="color:#fff;font-size:8px;font-weight:800">✓</span>':""}</div>`:`<div style="width:15px;flex-shrink:0"></div>`}
    <span onclick="editTitle('${id}')" style="flex:1;min-width:0;font-size:12px;font-weight:600;color:${n.status==="完了"?"#A8A29E":"#1C1917"};text-decoration:${n.status==="完了"?"line-through":"none"};cursor:text;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.title)}</span>
    <span style="font-size:8px;padding:2px 5px;border-radius:8px;background:${n.priority==="高"?"#FEE2E2":n.priority==="中"?"#FEF3C7":"#F5F5F4"};color:${n.priority==="高"?"#DC2626":n.priority==="中"?"#D97706":"#78716C"};font-weight:700;flex-shrink:0">${n.priority||"中"}</span>
    <button onclick="delNode('${id}')" style="background:none;border:none;color:#C7B8A8;font-size:14px;cursor:pointer;flex-shrink:0;line-height:1">×</button>
  </div>
  <div style="display:flex;align-items:center;gap:4px;margin-top:6px;margin-left:20px;flex-wrap:wrap">
    <select onchange="updNode('${id}','lifeArea',this.value)" style="background:${ac}18;color:${ac};border:none;border-radius:5px;font-size:9px;padding:2px 4px;font-weight:700">${AREAS.map(a=>`<option${n.lifeArea===a?" selected":""}>${a}</option>`).join("")}</select>
    <select onchange="updNode('${id}','status',this.value)" style="background:${sc.bg};color:${sc.t};border:none;border-radius:5px;font-size:9px;padding:2px 4px;font-weight:700">${STATUSES.map(s=>`<option${n.status===s?" selected":""}>${s}</option>`).join("")}</select>
    <select onchange="updNode('${id}','timeHorizon',this.value)" style="background:${hc}18;color:${hc};border:none;border-radius:5px;font-size:9px;padding:2px 4px;font-weight:700">${HORIZONS.map(h=>`<option${n.timeHorizon===h?" selected":""}>${h}</option>`).join("")}</select>
    <button onclick="addChild('${id}')" style="background:${hc}18;border:none;color:${hc};border-radius:5px;font-size:9px;padding:2px 8px;cursor:pointer;font-weight:700">＋子</button>
    ${n.parentId?`<button onclick="promoteNode('${id}')" style="background:#EDE9FE;border:none;color:#7C3AED;border-radius:5px;font-size:9px;padding:2px 7px;cursor:pointer;font-weight:700">↑</button>`:""}
    ${idx>0?`<button onclick="demoteNode('${id}')" style="background:#DBEAFE;border:none;color:#1D4ED8;border-radius:5px;font-size:9px;padding:2px 7px;cursor:pointer;font-weight:700">↓</button>`:""}
  </div>
  <div style="display:flex;align-items:center;gap:5px;margin-top:4px;margin-left:20px">
    <div class="pbar"><div class="pbar-fill" style="width:${prog}%;background:${n.status==="完了"?"#10B981":hc}"></div></div>
    ${hasKids
      ?`<span style="font-size:9px;color:var(--light);font-weight:600">${prog}%（自動）</span>`
      :`<input type="number" min="0" max="100" value="${n.progress}" onchange="updNode('${id}','progress',Math.min(100,Math.max(0,Number(this.value))))" style="width:34px;background:transparent;border:none;border-bottom:1px solid #E7E5E4;color:var(--light);font-size:9px;font-weight:600;text-align:right;padding:0;outline:none;font-family:inherit"/><span style="font-size:9px;color:var(--light)">%</span>`
    }
  </div>
</div>
${ch}</div>`;
}

// ── Task Card HTML ─────────────────────────────────────────────────────────────
function taskCard(t,mini=true){
  const d=daysUntil(t.deadline);
  const urgColor=d===null?"#A8A29E":d<=3?"#EF4444":d<=7?"#F97316":"#10B981";
  const recDone=t.recurring&&lsGet("rec-"+todayStr()+"-"+t.id,false);
  const isDone=t.recurring?recDone:(t.status==="完了");
  const fromGoal=t.goalNodeId?"🎯 ":"";
  const seatLabel=t.seatType==="light"?'<span class="seat-tag seat-light">片手間</span>':'<span class="seat-tag seat-deep">腰を据えて</span>';
  if(mini){
    return`<div style="background:${recDone?"#F0FDF4":"white"};border:1px solid ${recDone?"#BBF7D0":"rgba(0,0,0,.06)"};border-radius:7px;padding:6px 8px;margin-bottom:3px;overflow:hidden">
  <div style="display:flex;align-items:center;gap:5px">
    <div onclick="toggleTaskStatus('${t.id}')" style="width:12px;height:12px;border-radius:3px;border:2px solid ${isDone?"#10B981":"#D6D3D1"};background:${isDone?"#10B981":"transparent"};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center">${isDone?'<span style="color:#fff;font-size:7px">✓</span>':""}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:600;color:${isDone?"#9CA3AF":"#1C1917"};text-decoration:${isDone?"line-through":"none"};line-height:1.3;word-break:break-all">${fromGoal}${esc(t.title)}</div>
      ${recDone?'<div style="font-size:9px;color:#10B981;font-weight:700">今日完了 ✓</div>':""}
      ${d!==null&&!recDone?`<div style="font-size:9px;color:${urgColor};font-weight:700">残${d}日</div>`:""}
    </div>
    ${!t.goalNodeId?`<button onclick="delTask('${t.id}')" style="background:none;border:none;color:#D6D3D1;font-size:12px;cursor:pointer;flex-shrink:0;line-height:1">×</button>`:""}
  </div>
</div>`;
  }
  // List view

function traceHTML(){

${yest?.challenge?`<div class="card" style="border-left:3px solid var(--amber);background:var(--amber-pale)">

  <div class="lbl" style="color:#7C3AED">📋 今日のタスク</div>
  ${tasks3.map((t,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
    <div onclick="doToggleTask(${i})" class="check ${t.done?'done':''}">${t.done?'<span style="color:#fff;font-size:9px;font-weight:800">✓</span>':""}</div>
    <input value="${esc(t.t||"")}" placeholder="タスク ${i+1}" onchange="doUpdateTask(${i},'t',this.value)" class="input" style="margin:0;text-decoration:${t.done?'line-through':'none'};color:${t.done?'var(--light)':'var(--text)'}"/>

${yest?.challenge?`<div class="card card-green">
  <div class="lbl lbl-green">🔄 昨日の課題 → 今日どうするか</div>
  <textarea class="textarea" rows="2" onchange="doUpdateEntry('challengeResponse',this.value)">${esc(e.challengeResponse||"")}</textarea>
</div>`:""}

<div class="card card-red">
  <div class="lbl lbl-red">⚠️ 今日の課題（夜に記録）</div>
  <textarea class="textarea" rows="2" placeholder="今日うまくいかなかったこと・改善" onchange="doUpdateEntry('challenge',this.value)">${esc(e.challenge||"")}</textarea>
</div>

<div style="text-align:center;font-size:10px;color:var(--light);padding:6px 0;font-weight:600">入力すると自動保存されます（右上 ✓）</div>
</div>`;
  } else {
    const allDates=new Set([...Object.keys(routineEntries),...Object.keys(firstSteps)]);
    const dates=[...allDates].filter(d=>d!==todayStr()).sort((a,b)=>b.localeCompare(a));
    const filtered=S.search?dates.filter(d=>{const en=routineEntries[d]||{};const fs=firstSteps[d];return[en.goal||"",...(en.tasks||[]).map(t=>typeof t==="object"?t.t||"":t||""),en.challenge||"",en.challengeResponse||"",fs?.text||""].join(" ").toLowerCase().includes(S.search.toLowerCase())}):dates;
    content=`<div style="padding:14px">
${traceHTML()}
<input oninput="S.search=this.value;render()" value="${esc(S.search)}" placeholder="🔍 過去の記録を検索..." class="input" style="margin-bottom:12px"/>
${filtered.length===0?'<div style="text-align:center;padding:40px;color:var(--light);font-size:13px">記録がありません</div>':filtered.map(d=>{
  const en=routineEntries[d]||{};const ts=en.tasks||[];
  const fs=firstSteps[d];
  const dayT=lsGet("daytype-"+d,"");
  return`<div style="background:var(--warm);border-radius:var(--r);border:1px solid var(--border);padding:12px;margin-bottom:8px;box-shadow:var(--shadow)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
    <div style="font-size:11px;font-weight:800;color:var(--amber)">${fmtDisp(d)}</div>
    ${dayT?`<span style="font-size:9px;background:var(--amber-pale);color:var(--amber);padding:2px 7px;border-radius:10px;font-weight:700">${dayT}</span>`:""}
  </div>
  ${fs?.text?`<div style="font-size:12px;color:${fs.done?"var(--green)":"var(--muted)"};font-weight:700;margin-bottom:4px">${fs.done?"🌱 ":"○ "}${esc(fs.text)}${fs.done?"":' <span style="font-size:9px;color:var(--light)">(未実行)</span>'}</div>`:""}
  ${en.goal?`<div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:4px">🎯 ${esc(en.goal)}</div>`:""}
  ${(DAY_SLOTS[dayT]||[]).map((_,i)=>{const sv=lsGet("slot-"+d+"-"+i,"");return sv?`<div style="font-size:11px;color:var(--coral);margin-bottom:2px;font-weight:600">⏰ ${_?.label||""}：${esc(sv)}</div>`:""}).join("")}
  ${ts.map(t=>{const tx=t&&typeof t==="object"?(t.t||""):(typeof t==="string"?t:"");const dn=t?.done||false;const stamp=t?.ts||"";return tx?`<div style="font-size:12px;color:${dn?"var(--green)":"var(--text)"};padding-left:6px;text-decoration:${dn?"line-through":"none"}">${dn?"✓ ":"· "}${esc(tx)}${stamp?` <span style="font-size:10px;color:var(--light)">(${stamp})</span>`:""}</div>`:""}).join("")}
  ${en.challengeResponse?`<div style="font-size:11px;color:var(--green);margin-top:4px;font-weight:600">🔄 ${esc(en.challengeResponse)}</div>`:""}
  ${en.challenge?`<div style="font-size:11px;color:var(--red);margin-top:2px;font-weight:600">⚠️ ${esc(en.challenge)}</div>`:""}
</div>`;}).join("")}
</div>`;
  }
  return`<div>
<div style="display:flex;padding:8px 14px;gap:6px;border-bottom:1px solid var(--border);background:var(--warm);align-items:center">
  <button onclick="S.rv='today';render()" style="background:${S.rv==='today'?'var(--amber-pale)':'var(--cream)'};border:1.5px solid ${S.rv==='today'?'var(--amber)':'var(--border)'};color:${S.rv==='today'?'var(--amber)':'var(--muted)'};border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">今日</button>
  <button onclick="S.rv='history';render()" style="background:${S.rv==='history'?'var(--amber-pale)':'var(--cream)'};border:1.5px solid ${S.rv==='history'?'var(--amber)':'var(--border)'};color:${S.rv==='history'?'var(--amber)':'var(--muted)'};border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer">振り返り</button>
  <span style="margin-left:auto;font-size:10px;color:var(--light);font-weight:600">${total}日目</span>
</div>
${content}</div>`;
}

// ── App ───────────────────────────────────────────────────────────────────────
function buildApp(){
  const tab=S.tab;
  const titles={routine:"🌅 朝ルーティン",tasks:"📋 タスク表",goals:"🎯 目標管理"};
  return`<div style="min-height:100vh;background:var(--cream)">
<div class="header">
  <div class="header-top">
    <div class="header-title">${titles[tab]||"🌅 朝ルーティン"}</div>
    <div class="header-date">${todayLabel()}</div>
  </div>
  <div class="tabs">
    <button onclick="S.tab='routine';render()" class="tab-btn ${tab==='routine'?'active':''}">🌅 朝</button>
    <button onclick="S.tab='tasks';render()" class="tab-btn ${tab==='tasks'?'active':''}">📋 タスク</button>
    <button onclick="S.tab='goals';render()" class="tab-btn ${tab==='goals'?'active':''}">🎯 目標</button>
  </div>
</div>
${tab==="routine"?buildRoutineTab():tab==="tasks"?buildTaskTab():buildGoalTab()}
</div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────────
window.setF=function(t,v){if(t==="a")S.af=v;else if(t==="h")S.hf=v;else S.sf=v;render();};
window.setMonthly=function(v){monthlyGoal=v;lsSet("monthly-"+monthStr(),v);render();};
window.setWeekly=function(v){weeklyGoal=v;lsSet("weekly-"+weekStr(),v);render();};
window.setDayTypeAction=function(v){setDayType(v);render();};
window.setFirstStepFromSelect=function(date,val){
  if(!val)return;
  if(val.slice(0,2)==="g:"){const id=val.slice(2);const n=goals.nodes[id];if(n)setFirstStepText(date,n.title,id);}
  else if(val.slice(0,2)==="m:"){setFirstStepText(date,val.slice(2),null);}
  render();
};
window.setFirstStepFromText=function(date,text){text=(text||"").trim();if(!text)return;setFirstStepText(date,text,null);render();};
window.toggleFirstStepAction=function(date){toggleFirstStepDone(date);render();};
window.clearFirstStep=function(date){delete firstSteps[date];saveFirstSteps();render();};
window.setSlotTaskAction=function(i,v){setSlotTask(i,v);render();};
window.setSeatFilter=function(i,v){setSlotSeat(i,v);render();};
window.doUpdateEntry=function(f,v){const e=getEntry();e[f]=v;routineEntries[todayStr()]=e;saveEntries();render();};
window.doToggleTask=function(i){
  const e=getEntry();
  const ts=e.tasks||[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}];
  ts[i].done=!ts[i].done;
  if(ts[i].done)ts[i].ts=new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  e.tasks=ts;routineEntries[todayStr()]=e;saveEntries();render();
};
window.doUpdateTask=function(i,f,v){
  const e=getEntry();
  if(!e.tasks)e.tasks=[{t:"",done:false,ts:""},{t:"",done:false,ts:""},{t:"",done:false,ts:""}];
  e.tasks[i]={...e.tasks[i],[f]:v};
  routineEntries[todayStr()]=e;saveEntries();
};
window.addTask=function(){
  const inp=document.getElementById("tinp");if(!inp||!inp.value.trim())return;
  const imp=document.getElementById("timp")?.value||"中";
  const seat=document.getElementById("tseat")?.value||"deep";
  const date=document.getElementById("tdate")?.value||null;
  tasks.push({id:uid(),title:inp.value.trim(),importance:imp,seatType:seat,deadline:date,status:"未着手",goalNodeId:null,recurring:false});
  saveTasks();inp.value="";if(document.getElementById("tdate"))document.getElementById("tdate").value="";render();
};
window.toggleTaskStatus=function(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(t.recurring){
    const key="rec-"+todayStr()+"-"+id;const done=lsGet(key,false);lsSet(key,!done);
    if(t.goalNodeId&&goals.nodes[t.goalNodeId]){goals.nodes[t.goalNodeId].status=!done?"完了":"進行中";if(!done)goals.nodes[t.goalNodeId].progress=100;else goals.nodes[t.goalNodeId].progress=50;saveGoals();}
  } else {
    t.status=t.status==="完了"?"未着手":"完了";
    if(t.goalNodeId&&goals.nodes[t.goalNodeId]){goals.nodes[t.goalNodeId].status=t.status;if(t.status==="完了")goals.nodes[t.goalNodeId].progress=100;else if(goals.nodes[t.goalNodeId].progress===100)goals.nodes[t.goalNodeId].progress=0;saveGoals();}
  }
  saveTasks();render();
};
window.toggleRecurring=function(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.recurring=!t.recurring;if(t.recurring)t.status="未着手";saveTasks();render();};
window.toggleSeat=function(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.seatType=t.seatType==="light"?"deep":"light";saveTasks();render();};
window.updTask=function(id,f,v){const t=tasks.find(t=>t.id===id);if(!t)return;t[f]=v;saveTasks();render();};
window.delTask=function(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();render();};
window.cycleStatus=function(id){const n=goals.nodes[id];if(!n||n.children?.length)return;n.status=n.status==="完了"?"未着手":n.status==="未着手"?"進行中":"完了";if(n.status==="完了")n.progress=100;saveGoals();render();};
window.editTitle=function(id){const n=goals.nodes[id];if(!n)return;const t=prompt("タイトルを編集",n.title);if(t&&t.trim()){n.title=t.trim();saveGoals();render();}};
window.delNode=function(id){
  if(!confirm("削除しますか？"))return;
  const n=goals.nodes[id];if(!n)return;
  const del=new Set();const col=i=>{del.add(i);(goals.nodes[i]?.children||[]).forEach(col);};col(id);
  del.forEach(i=>delete goals.nodes[i]);
  if(n.parentId&&goals.nodes[n.parentId])goals.nodes[n.parentId].children=goals.nodes[n.parentId].children.filter(c=>c!==id);
  goals.rootIds=goals.rootIds.filter(r=>r!==id);
  saveGoals();render();
};
window.updNode=function(id,f,v){goals.nodes[id][f]=v;saveGoals();render();};
window.addChild=function(pid){
  const nid=uid();const p=goals.nodes[pid];
  goals.nodes[nid]={id:nid,title:"新しい目標",timeHorizon:p.timeHorizon,status:"未着手",progress:0,priority:"中",lifeArea:p.lifeArea||"仕事",parentId:pid,children:[]};
  goals.nodes[pid].children.push(nid);saveGoals();render();
};
window.quickAdd=function(){
  const inp=document.getElementById("qinp");if(!inp||!inp.value.trim())return;
  const nid=uid();const area=document.getElementById("qarea")?.value||"仕事";
  goals.nodes[nid]={id:nid,title:inp.value.trim(),timeHorizon:"1年後",status:"未着手",progress:0,priority:"高",lifeArea:area,parentId:null,children:[]};
  goals.rootIds.push(nid);saveGoals();inp.value="";render();
};
window.doBulk=function(){
  const text=document.getElementById("bulktext")?.value||"";
  const area=document.getElementById("bulkarea")?.value||"仕事";
  const hor=document.getElementById("bulkhor")?.value||"1年後";
  if(!text.trim())return;
  const{ns,rs}=parseIndented(text,area,hor);
  Object.assign(goals.nodes,ns);goals.rootIds.push(...rs);
  saveGoals();S.bulkOpen=false;render();
};
window.toggleSel=function(id){if(S.selected[id])delete S.selected[id];else S.selected[id]=true;render();};
window.bulkSet=function(f,v){if(!v)return;Object.keys(S.selected).forEach(id=>{if(goals.nodes[id])goals.nodes[id][f]=v;});saveGoals();render();};
window.promoteNode=function(id){
  const n=goals.nodes[id];if(!n||!n.parentId)return;
  const p=goals.nodes[n.parentId];if(!p)return;
  p.children=p.children.filter(c=>c!==id);
  if(p.parentId){const gp=goals.nodes[p.parentId];const pi=gp.children.indexOf(n.parentId);gp.children.splice(pi+1,0,id);n.parentId=p.parentId;}
  else{const pi=goals.rootIds.indexOf(n.parentId);goals.rootIds.splice(pi+1,0,id);n.parentId=null;}
  saveGoals();render();
};
window.demoteNode=function(id){
  const n=goals.nodes[id];const sib=n.parentId?(goals.nodes[n.parentId]?.children||[]):(goals.rootIds);
  const idx=sib.indexOf(id);if(idx===0)return;
  const prev=goals.nodes[sib[idx-1]];if(!prev)return;
  sib.splice(idx,1);n.parentId=prev.id;prev.children.push(id);
  saveGoals();render();
};

render();
</script>
