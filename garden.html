<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0e1320">
<title>ひとあし クエスト</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif;
    background:radial-gradient(130% 90% at 50% -10%,#1b2540 0%,#0e1320 55%,#080b14 100%);
    color:#e8edf7;min-height:100%;
    padding:max(10px,env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;align-items:center;gap:10px;overflow-x:hidden;
  }
  .wrap{width:100%;max-width:440px;display:flex;flex-direction:column;gap:10px}

  /* 上部ステータス（進んでいく実感＝レベル/最高到達/撃破） */
  .hud{display:flex;gap:8px}
  .hud .cell{flex:1;background:#161e33;border:1px solid #2a3654;border-radius:12px;padding:7px 4px;text-align:center}
  .hud .n{font-size:18px;font-weight:800;color:#bcd3ff}
  .hud .l{font-size:10px;color:#8294bd;margin-top:1px}

  /* 今日の一歩バナー（ふり返りを忍ばせる・非ブロッキング） */
  .banner{background:linear-gradient(#1c2742,#172037);border:1px solid #33436b;border-radius:14px;
    padding:11px 13px;font-size:14px}
  .banner .q{font-weight:700;margin:0 0 8px}
  .banner .sub{font-size:12px;color:#9fb0d6;margin:-4px 0 8px;line-height:1.5}
  .banner.done{border-color:#3a6b4d;background:linear-gradient(#16301f,#142a1c)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .mini{border:0;border-radius:11px;padding:10px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .1s}
  .mini:active{transform:scale(.95)}
  .mini.go{background:linear-gradient(#46c96f,#2ea158);color:#04130a;flex:1}
  .mini.skip{background:#222d49;color:#cdd9f2;border:1px solid #33436b;flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .chip{background:#222d49;border:1px solid #33436b;color:#cdd9f2;border-radius:999px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit}
  .chip.on{background:#5b8cff;color:#04122e;border-color:#5b8cff}
  .note{margin-top:9px}
  .note input{width:100%;background:#0d1426;border:1px solid #33436b;color:#e8edf7;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none}
  .note input:focus{border-color:#5b8cff}
  .fold{background:none;border:0;color:#8294bd;font-size:12px;cursor:pointer;font-family:inherit;padding:6px 0 0;text-decoration:underline}
  .buffline{font-size:12px;color:#9fe0b6;margin-top:7px;line-height:1.5}

  /* 敵 */
  .enemy{background:#161e33;border:1px solid #2a3654;border-radius:14px;padding:12px;text-align:center;position:relative;overflow:hidden}
  .enemy .floor{font-size:11px;color:#8294bd;letter-spacing:.05em}
  .enemy .face{font-size:46px;line-height:1;margin:2px 0 6px;transition:transform .12s}
  .enemy.hurt .face{animation:shake .25s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .enemy .name{font-size:13px;font-weight:700}
  .enemy .weak{font-size:11px;color:#ffd27a;margin-top:2px}
  .charge{font-size:11px;color:#ff9a8c;margin-top:3px;font-weight:700}
  .bar{height:9px;background:#0c1426;border-radius:6px;overflow:hidden;margin-top:7px;border:1px solid #2a3654}
  .bar > i{display:block;height:100%;border-radius:6px;transition:width .35s ease}
  .ehp > i{background:linear-gradient(90deg,#ff6a5a,#ff3d6a)}

  /* プレイヤーHP */
  .me{display:flex;align-items:center;gap:10px;background:#161e33;border:1px solid #2a3654;border-radius:12px;padding:8px 12px}
  .me .av{font-size:24px}
  .me .col{flex:1}
  .me .lab{font-size:11px;color:#8294bd;display:flex;justify-content:space-between}
  .php > i{background:linear-gradient(90deg,#46c96f,#7ee08f)}

  /* 盤面 */
  .boardwrap{position:relative}
  .board{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .orb{aspect-ratio:1;border:0;border-radius:50%;font-size:21px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;font-family:inherit;color:#0a0f1c;font-weight:800;
    box-shadow:inset 0 -3px 6px rgba(0,0,0,.28),inset 0 2px 4px rgba(255,255,255,.35);
    transition:transform .09s;animation:drop .22s backwards}
  .orb:active{transform:scale(.9)}
  .orb.clearing{animation:clr .16s forwards}
  @keyframes drop{from{transform:translateY(-14px) scale(.6);opacity:0}to{transform:none;opacity:1}}
  @keyframes clr{to{transform:scale(0);opacity:0}}

  .ctrl{display:flex;gap:8px;align-items:center}
  .skill{flex:1;border:0;border-radius:13px;padding:13px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;
    background:linear-gradient(#ffd23a,#ffac2e);color:#3a2400;transition:transform .1s,filter .2s}
  .skill:active{transform:scale(.97)}
  .skill:disabled{filter:grayscale(.8) brightness(.6);cursor:default}

  /* 演出 */
  .pop{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-size:30px;font-weight:900;
    pointer-events:none;z-index:30;text-shadow:0 2px 8px rgba(0,0,0,.5);animation:popa .8s ease-out forwards;color:#ffe27a}
  @keyframes popa{0%{transform:translate(-50%,-50%) scale(.4);opacity:0}25%{opacity:1;transform:translate(-50%,-70%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-140%) scale(1)}}

  /* オーバーレイ（撃破・敗北） */
  .ov{position:fixed;inset:0;background:rgba(8,11,20,.86);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;z-index:60;padding:24px;text-align:center;animation:fade .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .ov h2{margin:0;font-size:26px}
  .ov p{margin:0;color:#aebcde;font-size:14px;line-height:1.6}
  .ov .big{font-size:54px}
  .ov button{border:0;border-radius:14px;padding:14px 26px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;
    background:linear-gradient(#5b8cff,#3d6ae0);color:#fff}

  .foot{text-align:center;font-size:11px;color:#5c6c92;line-height:1.6}
  .foot a{color:#7e93c4}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="cell"><div class="n" id="hud-lv">1</div><div class="l">レベル</div></div>
    <div class="cell"><div class="n" id="hud-floor">1</div><div class="l">いまの階</div></div>
    <div class="cell"><div class="n" id="hud-max">1</div><div class="l">最高到達</div></div>
    <div class="cell"><div class="n" id="hud-kill">0</div><div class="l">撃破</div></div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="enemy" id="enemy">
    <div class="floor" id="e-floor"></div>
    <div class="face" id="e-face">👾</div>
    <div class="name" id="e-name"></div>
    <div class="weak" id="e-weak"></div>
    <div class="charge" id="e-charge"></div>
    <div class="bar ehp"><i id="e-hp"></i></div>
  </div>

  <div class="me">
    <div class="av">🧗</div>
    <div class="col">
      <div class="lab"><span>あなた</span><span id="p-hpnum"></span></div>
      <div class="bar php"><i id="p-hp"></i></div>
    </div>
  </div>

  <div class="boardwrap">
    <div class="board" id="board"></div>
    <div id="poplayer"></div>
  </div>

  <div class="ctrl">
    <button class="skill" id="skill">⚡ ひらめき <span id="skill-n"></span></button>
  </div>

  <div class="foot">
    つなげて消す → 進む。1回2〜3分、いつ閉じてもOK。<br>
    今日の一歩を「できた」にすると、今日のあなたが強くなる。
    　<a href="goal-manager.html">→ 本体へ</a>
  </div>
</div>

<script>
/* ───────────────────────────────────────────────────────────────
   ひとあし クエスト — game-reflection-handoff.md §5 改良プロト
   ・パズル×バトルでフロアを上る＝「進んでいく」ゲーム性
   ・現実の「今日の一歩(done/理由/気づき)」が、その回の自分を強化する
     ＝§2「ふり返りを忍ばせる」/ §4 first-steps・reflections 連動
   ・§3：責めない・枯らさない・制限に依存しない・気楽さ最優先
   ─────────────────────────────────────────────────────────────── */

// ── 既存アプリ互換ヘルパ ──
const lsGet=(k,d=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr=()=>fmtDate(new Date());
const FAIL_REASONS=["疲れてた","重すぎた","忘れてた","時間がなかった","気が乗らなかった"];
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ── §4 共有データ：first-steps / reflections を読み書き ──
let firstSteps={}, reflections={};
function loadShared(){ firstSteps=lsGet("first-steps",{})||{}; reflections=lsGet("reflections",{})||{}; }
function getFS(d){ return firstSteps[d]||null; }
function setDone(d,val){
  const prev=firstSteps[d]||{text:"",goalNodeId:null,done:false,doneTs:""};
  prev.done=val;
  prev.doneTs=val?new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}):"";
  firstSteps[d]={...prev}; lsSet("first-steps",firstSteps);
}
function getRefl(d){ return reflections[d]||{reason:"",note:""}; }
function setReason(d,r){ const x=getRefl(d); x.reason=(x.reason===r?"":r); reflections[d]=x; lsSet("reflections",reflections); }
function setNote(d,n){ const x=getRefl(d); x.note=n; reflections[d]=x; lsSet("reflections",reflections); }

// ── ゲームのメタ進行（別キー。積み重ねの記録） ──
let META=lsGet("hitoashi-game",{ kills:0, maxFloor:1 });
function saveMeta(){ lsSet("hitoashi-game",META); }
function level(){ return 1+Math.floor(META.kills/5); }

// ── 属性 ──
const ELEMS=[
  {k:"fire", sym:"🔥", color:"#ff5d4d", strong:"wood"},
  {k:"water",sym:"💧", color:"#3aa3ff", strong:"fire"},
  {k:"wood", sym:"🌿", color:"#46c96f", strong:"water"},
  {k:"light",sym:"⚡", color:"#ffd23a", strong:"dark"},
  {k:"dark", sym:"🌙", color:"#a86bff", strong:"light"},
];
const ROWS=5, COLS=6, MINP=3;

// ── 敵テンプレ ──
const FACES=["👾","🦇","🕷️","🐗","👹","🐉","🦂","🧟","🐺","👻","🦅","🐲"];
function makeEnemy(floor){
  const elem=Math.floor(Math.random()*5);
  // 弱点 = この属性に強い属性（プレイヤーがそれで殴ると1.5倍）
  let weak=0; for(let i=0;i<5;i++) if(ELEMS[i].strong===ELEMS[elem].k) weak=i;
  const hp=Math.round(50+floor*20+floor*floor*1.4);
  return {
    floor, elem, weak,
    face:FACES[(floor-1)%FACES.length],
    name:`${ELEMS[elem].sym}のぬし Lv${floor}`,
    maxhp:hp, hp,
    atk:Math.round(7+floor*2.4),
    interval:Math.max(2,4-Math.floor(floor/6)),
    charge:Math.max(2,4-Math.floor(floor/6)),
  };
}

// ── 実行時状態 ──
let G=null;          // {floor, board[], enemy, php, maxhp, atk, skill, busy, banner:{open}}
function buffs(){
  const t=todayStr(); const fs=getFS(t); const r=getRefl(t);
  return { done: !!(fs&&fs.done), rested: !!(r.reason), note: !!(r.note&&r.note.trim()) };
}
function calcMaxHP(){ const b=buffs(); return Math.round((100+(level()-1)*15)*(b.done?1.25:1)); }
function calcATK(){ const b=buffs(); return 5+(level()-1) + (b.done?1:0); }
function startSkill(){ const b=buffs(); return 1 + (b.done?1:0) + (b.note?1:0); }

function newRun(resumeFloor){
  const floor=resumeFloor||1;
  G={ floor, enemy:makeEnemy(floor), maxhp:calcMaxHP(), php:calcMaxHP(),
      atk:calcATK(), skill:startSkill(), busy:false, board:freshBoard() };
}
function freshBoard(){
  const b=new Array(ROWS*COLS);
  for(let i=0;i<b.length;i++) b[i]=Math.floor(Math.random()*5);
  // 開幕にいきなり巨大連結ができすぎないよう軽くほぐす（気楽だが大味すぎない）
  return b;
}

// ── 盤面ロジック ──
const idx=(r,c)=>r*COLS+c;
function neighbors(i){ const r=(i/COLS)|0,c=i%COLS,o=[];
  if(r>0)o.push(i-COLS); if(r<ROWS-1)o.push(i+COLS); if(c>0)o.push(i-1); if(c<COLS-1)o.push(i+1); return o; }
function flood(b,start){
  const e=b[start]; if(e==null) return [];
  const seen=new Set([start]), st=[start], out=[];
  while(st.length){ const i=st.pop(); out.push(i);
    for(const n of neighbors(i)) if(!seen.has(n)&&b[n]===e){ seen.add(n); st.push(n); } }
  return out;
}
function allGroups(b){ // 連結3+の全セル
  const seen=new Set(), res=[];
  for(let i=0;i<b.length;i++){ if(b[i]==null||seen.has(i))continue;
    const g=flood(b,i); g.forEach(x=>seen.add(x)); if(g.length>=MINP) res.push(...g); }
  return res;
}
function collapse(b){ // 重力＋補充
  for(let c=0;c<COLS;c++){ const col=[];
    for(let r=ROWS-1;r>=0;r--){ const v=b[idx(r,c)]; if(v!=null)col.push(v); }
    for(let r=ROWS-1;r>=0;r--){ b[idx(r,c)] = col.length? col.shift() : Math.floor(Math.random()*5); }
  }
}

// ── ダメージ計算 ──
function comboMult(combo){ return 1+0.3*(combo-1); }
function elemMult(e){ const ev=ELEMS[e], en=G.enemy;
  if(ev.strong===ELEMS[en.elem].k) return 1.6;          // 弱点を突いた
  if(ELEMS[en.elem].strong===ev.k) return 0.65;         // 返り討ち属性
  return 1;
}
function dealFromTally(tally,combo){
  let dmg=0; for(let e=0;e<5;e++) dmg += tally[e]*G.atk*elemMult(e);
  return Math.round(dmg*comboMult(combo));
}

// ── タップ処理（連鎖あり＝爽快） ──
async function tapOrb(i){
  if(!G||G.busy) return;
  const group=flood(G.board,i);
  if(group.length<MINP){ // 小さすぎ：軽い拒否反応のみ、ペナルティなし
    const el=document.querySelectorAll(".orb")[i]; if(el){el.style.transform="scale(.85)";setTimeout(()=>el.style.transform="",110);} return;
  }
  G.busy=true;
  let combo=0, tally=[0,0,0,0,0];
  let toClear=group;
  while(toClear.length){
    combo++;
    // 消える演出
    const cells=document.querySelectorAll(".orb");
    toClear.forEach(x=>{ tally[G.board[x]]++; if(cells[x])cells[x].classList.add("clearing"); });
    await sleep(150);
    toClear.forEach(x=>{ G.board[x]=null; });
    collapse(G.board);
    renderBoard();
    if(combo>=12) break;            // 安全弁
    toClear=allGroups(G.board);
    if(toClear.length) await sleep(120);
  }
  const dmg=dealFromTally(tally,combo);
  if(combo>=2) showPop(`${combo} れんさ！`);
  await hitEnemy(dmg);
  await afterMove();
  G.busy=false;
}

// ── ひらめき（必殺）：いちばん多い属性を全消し ──
async function useSkill(){
  if(!G||G.busy||G.skill<=0) return;
  G.busy=true; G.skill--;
  // 最多属性
  const cnt=[0,0,0,0,0]; G.board.forEach(v=>{if(v!=null)cnt[v]++;});
  let best=0; for(let e=1;e<5;e++) if(cnt[e]>cnt[best])best=e;
  const cells=document.querySelectorAll(".orb");
  const tally=[0,0,0,0,0];
  G.board.forEach((v,x)=>{ if(v===best){ tally[v]++; if(cells[x])cells[x].classList.add("clearing"); } });
  showPop("⚡ ひらめき！");
  await sleep(220);
  G.board.forEach((v,x)=>{ if(v===best)G.board[x]=null; });
  collapse(G.board); renderBoard();
  const dmg=Math.round(dealFromTally(tally,1)*2.2);  // 必殺は強い
  await hitEnemy(dmg);
  await afterMove();
  G.busy=false;
}

async function hitEnemy(dmg){
  G.enemy.hp=Math.max(0,G.enemy.hp-dmg);
  const en=$("enemy"); en.classList.add("hurt"); setTimeout(()=>en.classList.remove("hurt"),260);
  renderEnemy();
  await sleep(180);
}

async function afterMove(){
  if(G.enemy.hp<=0){ await onWin(); return; }
  // 敵のチャージ→攻撃
  G.enemy.charge--;
  if(G.enemy.charge<=0){
    G.enemy.charge=G.enemy.interval;
    let dmg=G.enemy.atk;
    G.php=Math.max(0,G.php-dmg);
    showPop(`-${dmg}`, "#ff7a7a");
    renderPlayer();
    await sleep(220);
    if(G.php<=0){ onLose(); return; }
  }
  renderEnemy();
}

async function onWin(){
  META.kills++; if(G.floor+1>META.maxFloor)META.maxFloor=G.floor+1; saveMeta();
  showPop("げきは！🎉");
  await sleep(450);
  // 次の階へ。少し回復（責めない・続けやすい）
  const b=buffs();
  let heal=Math.round(G.maxhp*0.15) + (b.rested?Math.round(G.maxhp*0.08):0);
  G.php=Math.min(G.maxhp,G.php+heal);
  G.floor++;
  G.maxhp=calcMaxHP(); G.atk=calcATK();           // レベルアップ反映
  if(G.floor%5===0) G.skill++;                     // 5階ごとに必殺補充
  G.enemy=makeEnemy(G.floor);
  G.board=freshBoard();
  renderAll();
}

function onLose(){
  // §3③：責めない。進行（最高到達・撃破・レベル）は残る。すぐ再挑戦できる。
  overlay(`<div class="big">🌙</div>
    <h2>ここまで。</h2>
    <p>また明日でも、今すぐでもいい。<br>
    最高到達 <b>${META.maxFloor}階</b> ・ 累計撃破 <b>${META.kills}</b> は消えないよ。</p>
    <button id="ov-btn">▶ もう一度ふもとから</button>`, ()=>{ newRun(1); renderAll(); });
}

// ── 描画 ──
function renderHUD(){
  $("hud-lv").textContent=level();
  $("hud-floor").textContent=G?G.floor:1;
  $("hud-max").textContent=META.maxFloor;
  $("hud-kill").textContent=META.kills;
}
function renderEnemy(){
  const en=G.enemy;
  $("e-floor").textContent=`${en.floor}階`;
  $("e-face").textContent=en.face;
  $("e-name").textContent=en.name;
  $("e-weak").textContent=`弱点：${ELEMS[en.weak].sym}（1.6倍）`;
  $("e-charge").textContent=`こうげきまで あと ${en.charge} 手`;
  $("e-hp").style.width=(100*en.hp/en.maxhp)+"%";
}
function renderPlayer(){
  $("p-hp").style.width=(100*G.php/G.maxhp)+"%";
  $("p-hpnum").textContent=`${G.php}/${G.maxhp}`;
}
function renderBoard(){
  const wrap=$("board");
  // 差分更新せず全描画（30セルなので軽い）
  wrap.innerHTML="";
  G.board.forEach((v,i)=>{
    const b=document.createElement("button");
    b.className="orb"; b.style.background=ELEMS[v].color; b.textContent=ELEMS[v].sym;
    b.style.animationDelay=((i%COLS)*0.012)+"s";
    b.onclick=()=>tapOrb(i);
    wrap.appendChild(b);
  });
}
function renderSkill(){
  $("skill-n").textContent="×"+G.skill;
  $("skill").disabled = G.skill<=0;
}
function renderAll(){ renderHUD(); renderEnemy(); renderPlayer(); renderBoard(); renderSkill(); renderBanner(); }

function showPop(txt,color){
  const p=document.createElement("div"); p.className="pop"; p.textContent=txt;
  if(color)p.style.color=color;
  $("poplayer").appendChild(p); setTimeout(()=>p.remove(),850);
}

// ── 今日の一歩バナー（ふり返りを忍ばせる） ──
let bannerMode=null; // null=未, 'reason'=理由選択中
function renderBanner(){
  loadShared();
  const t=todayStr(); const fs=getFS(t); const r=getRefl(t);
  const bn=$("banner");
  const stepText=fs&&fs.text?`<div class="sub">きょうの一歩：「${esc(fs.text)}」</div>`:"";
  if(fs&&fs.done){
    bn.className="banner done";
    bn.innerHTML=`<p class="q">🔥 今日の一歩、完了ずみ</p>${stepText}
      <div class="buffline">今日のあなた：HP増量＋ひらめき＋1${r.note?" ・ 気づきボーナス":""}</div>
      ${noteHTML(r.note)}`;
    wireNote();
    return;
  }
  if(bannerMode==='reason' || r.reason){
    bn.className="banner";
    bn.innerHTML=`<p class="q">大丈夫。どんな日だった？</p>
      <div class="sub">選んでも選ばなくてもOK。責めないよ。${r.reason?`<br>→「${esc(r.reason)}」：ひと休みの加護（毎階かいふく）`:""}</div>
      <div class="chips" id="chips"></div>
      ${noteHTML(r.note)}
      <button class="mini go" id="b-late" style="margin-top:9px">やっぱり、できた！</button>`;
    renderChips(r.reason);
    wireNote();
    $("b-late").onclick=()=>{ setDone(t,true); bannerMode=null; applyLiveBuff(); renderAll(); showPop("チカラがみなぎる！","#9fe0b6"); };
    return;
  }
  bn.className="banner";
  bn.innerHTML=`<p class="q">今日の一歩、できた？</p>${stepText}
    <div class="row">
      <button class="mini go" id="b-yes">できた</button>
      <button class="mini skip" id="b-no">まだ</button>
    </div>`;
  $("b-yes").onclick=()=>{ setDone(t,true); applyLiveBuff(); renderAll(); showPop("チカラがみなぎる！","#9fe0b6"); };
  $("b-no").onclick=()=>{ bannerMode='reason'; renderBanner(); };
}
function renderChips(active){
  const box=$("chips"); if(!box)return; box.innerHTML="";
  FAIL_REASONS.forEach(r=>{ const c=document.createElement("button");
    c.className="chip"+(r===active?" on":""); c.textContent=r;
    c.onclick=()=>{ setReason(todayStr(),r); renderBanner(); }; box.appendChild(c); });
}
function noteHTML(val){
  return `<div class="note"><input id="noteIn" type="text" maxlength="60"
    placeholder="今日の気づき（任意・必殺＋1）" value="${esc(val||"")}"></div>`;
}
function wireNote(){
  const inp=$("noteIn"); if(!inp)return; let had=!!inp.value.trim();
  inp.addEventListener("change",()=>{ const v=inp.value.trim(); setNote(todayStr(),v);
    if(v&&!had){ if(G)G.skill++; renderSkill(); showPop("ひらめき＋1 🦋","#ffe27a"); } had=!!v; });
}

// 一歩を「できた」にしたら、実行中の自分も即強化（=現実の行動がゲームに効く）
function applyLiveBuff(){
  if(!G)return; const nm=calcMaxHP();
  G.php=Math.min(nm, G.php + Math.max(0,nm-G.maxhp)); // 増えた分だけ回復
  G.maxhp=nm; G.atk=calcATK(); G.skill+=1;
}

function overlay(html,onBtn){
  const d=document.createElement("div"); d.className="ov"; d.innerHTML=html; document.body.appendChild(d);
  const btn=d.querySelector("#ov-btn"); if(btn)btn.onclick=()=>{ d.remove(); onBtn&&onBtn(); };
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// ── 起動 ──
$("skill").onclick=useSkill;
loadShared();
newRun(1);
renderAll();
window.addEventListener("focus",()=>{ loadShared(); renderBanner(); });
</script>
</body>
</html>
